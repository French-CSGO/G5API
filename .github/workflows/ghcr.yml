name: Publish to GHCR
on:
  workflow_dispatch:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - master
jobs:
  push:
    name: Create build and push to GHCR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.2.1
        with:
          buildkitd-flags: --debug
      - id: string
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ github.repository_owner }}
      - uses: actions/checkout@v3.3.0
      - uses: docker/login-action@v4.0.0
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.TOKEN }}
      - id: getversion
        uses: Saionaro/extract-package-version@v1.3.0
      - uses: docker/build-push-action@v3.2.0
        if: github.event_name != 'pull_request' && github.ref != 'refs/heads/master'
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/g5api:next
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v3.2.0
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/g5api:latest,ghcr.io/${{ steps.string.outputs.lowercase }}/g5api:${{ steps.getversion.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v3.2.0
        if: github.event_name == 'pull_request'
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
